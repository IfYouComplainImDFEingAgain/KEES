name: Package Extension

on:
  push:
    tags:
      - 'kees-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/kees-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/kees-v}"
          else
            VERSION=$(jq -r '.version' extension/manifest.json)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set manifest version
        run: |
          jq '.version = "${{ steps.version.outputs.version }}"' extension/manifest.json > tmp.json && mv tmp.json extension/manifest.json

      - name: Package extension
        run: |
          cd extension
          zip -r ../kees-${{ steps.version.outputs.version }}.zip \
            manifest.json \
            src/ \
            popup/ \
            icons/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kees-${{ steps.version.outputs.version }}
          path: kees-${{ steps.version.outputs.version }}.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/kees-v')
        uses: softprops/action-gh-release@v1
        with:
          files: kees-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
