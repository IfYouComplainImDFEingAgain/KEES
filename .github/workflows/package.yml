name: Package Extension

on:
  push:
    tags:
      - 'kees-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Build extension
        working-directory: extension
        run: npm run build

      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r '.version' extension/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package extension
        run: |
          cd extension
          zip -r ../kees-${{ steps.version.outputs.version }}.zip \
            manifest.json \
            dist/ \
            src/background.js \
            src/homepage-hide.css \
            src/attachment-exif-inject.js \
            src/attachment-exif-page.js \
            src/features/scrollback.js \
            popup/ \
            icons/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kees-${{ steps.version.outputs.version }}
          path: kees-${{ steps.version.outputs.version }}.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/kees-v')
        uses: softprops/action-gh-release@v1
        with:
          files: kees-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
