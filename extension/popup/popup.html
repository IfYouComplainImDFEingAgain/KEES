<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            width: 280px;
            padding: 16px;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 13px;
            background: #1a1a1a;
            color: #e0e0e0;
        }
        h1 {
            margin: 0 0 16px 0;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }
        .setting {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #2a2a2a;
        }
        .setting:last-child {
            border-bottom: none;
        }
        .setting-label {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .setting-title {
            font-weight: 500;
            color: #fff;
        }
        .setting-desc {
            font-size: 11px;
            color: #888;
        }
        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }
        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            border-radius: 24px;
            transition: 0.2s;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: #fff;
            border-radius: 50%;
            transition: 0.2s;
        }
        .toggle input:checked + .toggle-slider {
            background-color: #4caf50;
        }
        .toggle input:checked + .toggle-slider:before {
            transform: translateX(20px);
        }
        .status {
            margin-top: 12px;
            padding: 8px;
            background: #2a2a2a;
            border-radius: 4px;
            font-size: 11px;
            color: #4caf50;
            text-align: center;
            display: none;
        }
        .status.show {
            display: block;
        }
    </style>
</head>
<body>
    <h1>Sneedchat Enhancer</h1>

    <div class="setting">
        <div class="setting-label">
            <span class="setting-title">Disable Homepage Chat</span>
            <span class="setting-desc">Hide the chat widget on the forum homepage</span>
        </div>
        <label class="toggle">
            <input type="checkbox" id="disable-homepage-chat">
            <span class="toggle-slider"></span>
        </label>
    </div>

    <div id="status" class="status">Settings saved!</div>

    <script src="popup.js"></script>
</body>
</html>
